<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neko Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#080808;
  --surface:#111;
  --surface2:#1a1a1a;
  --border:rgba(255,255,255,0.07);
  --border-hi:rgba(255,255,255,0.16);
  --text:#f0f0f0;
  --muted:rgba(255,255,255,0.35);
  --dim:rgba(255,255,255,0.14);
  --glass:rgba(255,255,255,0.04);
  --glass-hi:rgba(255,255,255,0.08);
  --r:10px;
  --rl:16px;
  --ease:cubic-bezier(.4,0,.2,1);
}

html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── MATRIX CANVAS ── */
#mx{
  position:fixed;inset:0;z-index:8900;
  transition:opacity 1.6s var(--ease);
}
#mx.out{opacity:0;pointer-events:none}

/* ── INTRO ── */
#intro{
  position:fixed;inset:0;z-index:9000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  pointer-events:none;
  transition:opacity 1.6s var(--ease);
}
#intro.out{opacity:0}
#intro.gone{display:none}

#iWord{
  font-size:clamp(3rem,9vw,6rem);
  font-weight:700;letter-spacing:-.03em;
  background:linear-gradient(180deg,#fff 0%,#777 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  opacity:0;transform:translateY(18px);
  transition:opacity 1s var(--ease),transform 1s var(--ease);
}
#iWord.on{opacity:1;transform:translateY(0)}

#iTag{
  font-size:clamp(.68rem,1.8vw,.82rem);
  font-weight:400;letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);
  opacity:0;transition:opacity .9s var(--ease) .3s;
}
#iTag.on{opacity:1}

/* ── SITE ── */
#site{opacity:0;transition:opacity 1.1s var(--ease);min-height:100vh}
#site.on{opacity:1}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:500;
  background:rgba(8,8,8,.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  height:60px;display:flex;align-items:center;
  padding:0 24px;gap:14px;
}
.logo{
  font-size:1.05rem;font-weight:700;letter-spacing:-.02em;
  background:linear-gradient(180deg,#fff 0%,#888 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;flex-shrink:0;user-select:none;
}
.sep{width:1px;height:20px;background:var(--border-hi);flex-shrink:0}
.online{
  display:flex;align-items:center;gap:6px;
  font-size:.72rem;font-weight:500;color:var(--muted);flex-shrink:0;
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.6);
  animation:pulse 2.4s ease infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.sp{flex:1}
.sw{position:relative;flex-shrink:0}
.si{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--dim);pointer-events:none;
}
#sb{
  width:200px;background:var(--glass);
  border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-family:'Inter',sans-serif;
  font-size:.78rem;padding:8px 12px 8px 32px;
  outline:none;
  transition:border-color .2s,background .2s,width .3s var(--ease);
}
#sb::placeholder{color:var(--dim)}
#sb:focus{border-color:var(--border-hi);background:var(--glass-hi);width:260px}
.hbtn{
  display:flex;align-items:center;gap:6px;
  height:32px;padding:0 12px;
  background:var(--glass);border:1px solid var(--border);border-radius:var(--r);
  color:var(--muted);font-family:'Inter',sans-serif;
  font-size:.73rem;font-weight:500;cursor:pointer;
  transition:background .2s,border-color .2s,color .2s;
  white-space:nowrap;
}
.hbtn:hover{background:var(--glass-hi);border-color:var(--border-hi);color:#fff}
.hbtn.active{background:#fff;border-color:#fff;color:var(--bg)}

/* ── HISTORY PANEL ── */
.hpanel{
  position:fixed;top:60px;right:0;width:290px;
  background:var(--surface);border-left:1px solid var(--border);
  height:calc(100vh - 60px);z-index:400;
  transform:translateX(100%);
  transition:transform .35s var(--ease);
  display:flex;flex-direction:column;
}
.hpanel.open{transform:translateX(0)}
.hp-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;border-bottom:1px solid var(--border);
  font-size:.72rem;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);
}
.hclose{
  background:none;border:none;color:var(--dim);
  cursor:pointer;padding:4px;
  transition:color .2s;display:flex;align-items:center;
}
.hclose:hover{color:#fff}
#hlist{
  flex:1;overflow-y:auto;padding:10px;
  display:flex;flex-direction:column;gap:4px;
}
#hlist::-webkit-scrollbar{width:3px}
#hlist::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
.hi{
  padding:11px 13px;border-radius:var(--r);
  background:var(--glass);border:1px solid transparent;
  cursor:pointer;transition:background .2s,border-color .2s;
}
.hi:hover{background:var(--glass-hi);border-color:var(--border)}
.hi-t{font-size:.8rem;font-weight:500;color:var(--text);margin-bottom:3px}
.hi-s{font-size:.68rem;color:var(--muted)}
.hempty{font-size:.76rem;color:var(--dim);text-align:center;padding:30px 0}

/* ── MAIN ── */
.main{
  max-width:1200px;margin:0 auto;
  padding:44px 24px 80px;
  position:relative;z-index:1;
}
.eyebrow{
  font-size:.66rem;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:var(--dim);margin-bottom:18px;
}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(175px,1fr));
  gap:11px;
}

/* ── CARD ── */
.card{
  position:relative;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--rl);
  padding:24px 16px 18px;
  text-align:center;
  cursor:pointer;text-decoration:none;
  color:inherit;display:block;overflow:hidden;
  opacity:0;animation:cin .45s var(--ease) forwards;
  transition:transform .28s var(--ease),
             border-color .28s var(--ease),
             box-shadow .28s var(--ease),
             background .28s var(--ease);
}
/* Gloss sheen */
.card::before{
  content:'';position:absolute;inset:0;
  border-radius:var(--rl);
  background:linear-gradient(155deg,rgba(255,255,255,.055) 0%,transparent 55%);
  pointer-events:none;
}
/* Shimmer sweep */
.card::after{
  content:'';position:absolute;
  top:0;left:-80%;width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.045),transparent);
  transform:skewX(-18deg);pointer-events:none;
  transition:left .55s var(--ease);
}
.card:hover{
  transform:translateY(-6px) scale(1.01);
  border-color:rgba(255,255,255,.2);
  box-shadow:0 10px 28px rgba(0,0,0,.55),
             0 0 0 1px rgba(255,255,255,.06) inset;
  background:var(--surface2);
}
.card:hover::after{left:130%}
.card:active{transform:translateY(-3px) scale(.995)}
.card.hidden{display:none}
.card h3{
  font-size:.82rem;font-weight:600;letter-spacing:-.01em;
  color:var(--text);margin-bottom:5px;line-height:1.35;
  transition:color .2s;
}
.card:hover h3{color:#fff}
.card p{
  font-size:.66rem;font-weight:400;
  color:var(--dim);letter-spacing:.04em;text-transform:uppercase;
}
.card-rnd{border-style:dashed;border-color:rgba(255,255,255,.09)}
.card-rnd h3{color:var(--muted)}

@keyframes cin{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* Fav btn */
.fbtn{
  position:absolute;top:8px;right:9px;
  background:none;border:none;cursor:pointer;
  color:var(--dim);padding:3px;border-radius:4px;
  transition:color .2s,transform .2s;line-height:0;z-index:2;
}
.fbtn svg{width:12px;height:12px}
.fbtn:hover{color:var(--muted);transform:scale(1.15)}
.fbtn.on{color:#fff}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;z-index:800;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.active{opacity:1;pointer-events:all}
.modal{
  background:var(--surface);
  border:1px solid var(--border-hi);
  border-radius:var(--rl);
  padding:26px;width:min(400px,92vw);
  transform:translateY(10px) scale(.98);
  transition:transform .28s var(--ease);
}
.overlay.active .modal{transform:none}
.mtop{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:22px;
}
.mtitle{
  font-size:.78rem;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);
}
.mclose{
  background:none;border:none;color:var(--dim);
  cursor:pointer;transition:color .2s;
  display:flex;align-items:center;padding:4px;
}
.mclose:hover{color:#fff}
.slbl{
  font-size:.66rem;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--dim);margin-bottom:9px;
}
.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.tbtn{
  padding:9px 6px;border-radius:var(--r);
  border:1px solid var(--border);background:var(--glass);
  color:var(--muted);font-family:'Inter',sans-serif;
  font-size:.7rem;font-weight:500;cursor:pointer;
  transition:all .2s;text-align:center;
}
.tbtn:hover{border-color:var(--border-hi);color:#fff;background:var(--glass-hi)}
.tbtn.active{border-color:#fff;color:#fff;background:var(--glass-hi)}

/* ── THEMES ── */
body[data-theme=dim]{--bg:#0e0e0e;--surface:#161616;--surface2:#1e1e1e}
body[data-theme=midnight]{
  --bg:#030610;--surface:#0a0e1e;--surface2:#111626;
  --border:rgba(100,120,255,.1);--border-hi:rgba(100,120,255,.22);
}
body[data-theme=warm]{
  --bg:#0a0908;--surface:#131110;--surface2:#1b1916;
  --border:rgba(255,220,160,.08);--border-hi:rgba(255,220,160,.18);
}

/* ── FOOTER ── */
.footer{
  position:relative;z-index:1;text-align:center;
  padding:24px;font-size:.62rem;letter-spacing:.08em;
  color:var(--dim);text-transform:uppercase;
}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .hdr{padding:0 12px;gap:8px}
  .online{display:none}
  #sb{width:140px}
  #sb:focus{width:160px}
  .main{padding:26px 12px 60px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px}
  .hpanel{width:100%}
}
</style>
</head>
<body>

<canvas id="mx"></canvas>

<div id="intro">
  <div id="iWord">Neko Hub</div>
  <div id="iTag">your games &nbsp;/&nbsp; all in one place</div>
</div>

<div id="site">

  <header class="hdr">
    <div class="logo">Neko Hub</div>
    <div class="sep"></div>
    <div class="online">
      <div class="dot"></div>
      <span id="onlineCount">—</span>&nbsp;online
    </div>
    <div class="sp"></div>
    <div class="sw">
      <svg class="si" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5l3 3"/>
      </svg>
      <input type="text" id="sb" placeholder="Search games..." autocomplete="off">
    </div>
    <button class="hbtn" id="favFilter">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <polygon points="8,2 10,6 15,6.5 11,10.5 12.5,15.5 8,13 3.5,15.5 5,10.5 1,6.5 6,6"/>
      </svg>
      Favorites
    </button>
    <button class="hbtn" id="rndBtn">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M10 2h4v4M14 2l-5 5M6 14H2v-4M2 14l5-5"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="4" cy="4" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
      Random
    </button>
    <button class="hbtn" id="histBtn">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2.5 1.5"/>
      </svg>
      History
    </button>
    <button class="hbtn" id="setBtn">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
      </svg>
      Settings
    </button>
  </header>

  <aside class="hpanel" id="hpanel">
    <div class="hp-head">
      Recent
      <button class="hclose" id="hclose">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M3 3l10 10M13 3L3 13"/>
        </svg>
      </button>
    </div>
    <div id="hlist"></div>
  </aside>

  <main class="main">
    <p class="eyebrow">Games Library</p>
    <div class="grid" id="grid">
      <div class="card card-rnd" id="rndCard" style="animation-delay:0s">
        <h3>Random Game</h3>
        <p>Surprise me</p>
      </div>
    </div>
  </main>

  <footer class="footer">Neko Hub &mdash; for entertainment purposes</footer>
</div>

<div class="overlay" id="setOverlay">
  <div class="modal">
    <div class="mtop">
      <span class="mtitle">Settings</span>
      <button class="mclose" id="mclose">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M3 3l10 10M13 3L3 13"/>
        </svg>
      </button>
    </div>
    <p class="slbl">Theme</p>
    <div class="tgrid">
      <button class="tbtn" data-theme="default">Default</button>
      <button class="tbtn" data-theme="dim">Dim</button>
      <button class="tbtn" data-theme="midnight">Midnight</button>
      <button class="tbtn" data-theme="warm">Warm</button>
    </div>
  </div>
</div>

<script>
/* ── GAME LIST ── */
const GAMES=[
  {file:"Half-Life.html",title:"Half-Life"},
  {file:"Steal-A-Brainrot.html",title:"Steal A Brainrot"},
  {file:"Riddle-School-3.html",title:"Riddle School 3"},
  {file:"Riddle-School-2.html",title:"Riddle School 2"},
  {file:"Riddle-School.html",title:"Riddle School"},
  {file:"Papa_s-Pizeria.html",title:"Papas Pizzeria"},
  {file:"Moto-X3M.html",title:"Moto X3M"},
  {file:"Moto-X3M-2.html",title:"Moto X3M 2"},
  {file:"Hotline-Miami.html",title:"Hotline Miami"},
  {file:"Cuphead.html",title:"Cuphead"},
  {file:"Bloxorz.html",title:"Bloxorz"},
  {file:"Buckshot-Roulette.html",title:"Buckshot Roulette"},
  {file:"Time-Shooter-2.html",title:"Time Shooter 2"},
  {file:"Super-Mario-64.html",title:"Super Mario 64"},
  {file:"Soundboard.html",title:"Soundboard"},
  {file:"Sonic_EXE.html",title:"Sonic EXE"},
  {file:"Sonic-Mania.html",title:"Sonic Mania"},
  {file:"Rooftop-Snipers.html",title:"Rooftop Snipers"},
  {file:"Gorilla-Tag.html",title:"Gorilla Tag"},
  {file:"Bank-Robbery-2.html",title:"Bank Robbery 2"},
  {file:"Basket-Bros.html",title:"Basket Bros"},
  {file:"Baldis-Basics-Plus.html",title:"Baldis Basics Plus"},
  {file:"Granny.html",title:"Granny"},
  {file:"Gunspin.html",title:"Gunspin"},
  {file:"OvO.html",title:"OvO"},
  {file:"Raldis-Crackhouse.html",title:"Raldis Crackhouse"},
  {file:"Undertale-Yellow.html",title:"Undertale Yellow"},
  {file:"Vex-6.html",title:"Vex 6"},
  {file:"Web-Fishing.html",title:"Web Fishing"},
  {file:"Retro-Bowl.html",title:"Retro Bowl"},
  {file:"Geometry-Dash-Lite.html",title:"Geometry Dash Lite"},
  {file:"Friday-Night-Funkin.html",title:"Friday Night Funkin"},
  {file:"FNAF.html",title:"Five Nights at Freddys"},
  {file:"Slope.html",title:"Slope"},
  {file:"Duck-Life.html",title:"Duck Life"},
  {file:"Basketball-Stars.html",title:"Basketball Stars"},
  {file:"Bad-Time-Simulator.html",title:"Bad Time Simulator"},
  {file:"Minecraft.html",title:"Minecraft 1.12.2"},
  {file:"Terraria.html",title:"Terraria"},
];

/* ── MATRIX RAIN ── */
(()=>{
  const cv=document.getElementById('mx');
  const cx=cv.getContext('2d');
  const CW=16,CH='0123456789ABCDEF';
  let W,H,dr;
  function rs(){
    W=cv.width=window.innerWidth;
    H=cv.height=window.innerHeight;
    dr=Array.from({length:Math.floor(W/CW)+1},()=>Math.random()*-60);
  }
  function draw(){
    cx.fillStyle='rgba(0,0,0,.055)';cx.fillRect(0,0,W,H);
    dr.forEach((y,i)=>{
      const ch=CH[Math.floor(Math.random()*CH.length)];
      const px=i*CW,py=y*CW;
      cx.fillStyle='rgba(255,255,255,.9)';
      cx.font='13px Inter,monospace';
      cx.fillText(ch,px,py);
      cx.fillStyle='rgba(255,255,255,.15)';
      cx.fillText(CH[Math.floor(Math.random()*CH.length)],px,py-CW);
      if(py>H&&Math.random()>.975)dr[i]=0;
      dr[i]+=.55;
    });
  }
  rs();window.addEventListener('resize',rs);
  const t=setInterval(draw,38);

  /* intro sequence */
  const intro=document.getElementById('intro');
  const iw=document.getElementById('iWord');
  const it=document.getElementById('iTag');
  const site=document.getElementById('site');
  setTimeout(()=>iw.classList.add('on'),900);
  setTimeout(()=>it.classList.add('on'),1600);
  setTimeout(()=>{intro.classList.add('out');cv.classList.add('out')},2900);
  setTimeout(()=>site.classList.add('on'),3150);
  setTimeout(()=>{intro.classList.add('gone');cv.style.display='none';clearInterval(t)},4700);
})();

/* ── STORAGE HELPERS ── */
function load(k){try{return JSON.parse(localStorage.getItem(k))||[]}catch{return[]}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

/* ── FAVORITES ── */
let favs=load('gameFavorites');
function toggleFav(title,e){
  e.preventDefault();e.stopPropagation();
  favs.includes(title)?favs=favs.filter(f=>f!==title):favs.push(title);
  save('gameFavorites',favs);
  refreshFavBtns();
}
const STAR_ON=`<svg viewBox="0 0 16 16" fill="currentColor"><polygon points="8,2 10,6 15,6.5 11,10.5 12.5,15.5 8,13 3.5,15.5 5,10.5 1,6.5 6,6"/></svg>`;
const STAR_OFF=`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="8,2 10,6 15,6.5 11,10.5 12.5,15.5 8,13 3.5,15.5 5,10.5 1,6.5 6,6"/></svg>`;
function refreshFavBtns(){
  document.querySelectorAll('.fbtn').forEach(b=>{
    const on=favs.includes(b.dataset.t);
    b.classList.toggle('on',on);
    b.innerHTML=on?STAR_ON:STAR_OFF;
  });
}

/* ── HISTORY ── */
let hist=load('gameHistory');
function addHist(title,file){
  hist=hist.filter(i=>i.title!==title);
  hist.unshift({title,file,ts:new Date().toISOString()});
  hist=hist.slice(0,10);
  save('gameHistory',hist);
  renderHist();
}
function timeAgo(d){
  const s=Math.floor((Date.now()-new Date(d))/1000);
  if(s<60)return'Just now';
  if(s<3600)return`${Math.floor(s/60)}m ago`;
  if(s<86400)return`${Math.floor(s/3600)}h ago`;
  return`${Math.floor(s/86400)}d ago`;
}
function renderHist(){
  const el=document.getElementById('hlist');
  if(!el)return;
  el.innerHTML=hist.length
    ?hist.map(i=>`<div class="hi" onclick="location.href='games/${i.file}'">
        <div class="hi-t">${i.title}</div>
        <div class="hi-s">${timeAgo(i.ts)}</div>
      </div>`).join('')
    :'<p class="hempty">No games played yet.</p>';
}

/* ── ONLINE COUNT ── */
function updOnline(){
  const el=document.getElementById('onlineCount');
  if(el)el.textContent=42+Math.floor(Math.random()*15);
}
updOnline();setInterval(updOnline,5000);

/* ── RANDOM ── */
function openRnd(){
  const g=GAMES[Math.floor(Math.random()*GAMES.length)];
  location.href=`games/${g.file}`;
}

/* ── BUILD CARDS ── */
function buildCards(){
  const grid=document.getElementById('grid');
  GAMES.forEach((g,i)=>{
    const a=document.createElement('a');
    a.className='card';
    a.href=`games/${g.file}`;
    a.style.animationDelay=`${.04+i*.027}s`;

    const fb=document.createElement('button');
    fb.className='fbtn'+(favs.includes(g.title)?' on':'');
    fb.dataset.t=g.title;
    fb.innerHTML=favs.includes(g.title)?STAR_ON:STAR_OFF;
    fb.onclick=e=>toggleFav(g.title,e);

    a.innerHTML=`<h3>${g.title}</h3><p>Play now</p>`;
    a.prepend(fb);
    a.addEventListener('click',()=>addHist(g.title,g.file));
    grid.appendChild(a);
  });
}

/* ── SEARCH / FILTER ── */
let favsOnly=false;
function searchGames(q){
  const t=q.toLowerCase().trim();
  document.querySelectorAll('.card:not(.card-rnd)').forEach(c=>{
    c.classList.toggle('hidden',!c.querySelector('h3').textContent.toLowerCase().includes(t));
  });
}
function filterFavs(){
  favsOnly=!favsOnly;
  const btn=document.getElementById('favFilter');
  btn.classList.toggle('active',favsOnly);
  document.querySelectorAll('.card:not(.card-rnd)').forEach(c=>{
    if(favsOnly){c.classList.toggle('hidden',!favs.includes(c.querySelector('h3').textContent))}
    else{c.classList.remove('hidden');const sb=document.getElementById('sb');if(sb.value)searchGames(sb.value);}
  });
}

/* ── INIT ── */
window.addEventListener('load',()=>{
  buildCards();
  renderHist();

  const sb=document.getElementById('sb');
  sb.addEventListener('input',e=>{if(!favsOnly)searchGames(e.target.value)});

  document.getElementById('favFilter').addEventListener('click',filterFavs);
  document.getElementById('rndBtn').addEventListener('click',openRnd);
  document.getElementById('rndCard').addEventListener('click',openRnd);

  const hp=document.getElementById('hpanel');
  document.getElementById('histBtn').addEventListener('click',()=>hp.classList.toggle('open'));
  document.getElementById('hclose').addEventListener('click',()=>hp.classList.remove('open'));

  const ov=document.getElementById('setOverlay');
  document.getElementById('setBtn').addEventListener('click',()=>{ov.classList.add('active');document.body.style.overflow='hidden'});
  document.getElementById('mclose').addEventListener('click',()=>{ov.classList.remove('active');document.body.style.overflow=''});
  ov.addEventListener('click',e=>{if(e.target===ov){ov.classList.remove('active');document.body.style.overflow=''}});

  const saved=localStorage.getItem('siteTheme')||'default';
  document.body.setAttribute('data-theme',saved);
  document.querySelectorAll('.tbtn').forEach(b=>{
    if(b.dataset.theme===saved)b.classList.add('active');
    b.addEventListener('click',()=>{
      const t=b.dataset.theme;
      document.body.setAttribute('data-theme',t);
      localStorage.setItem('siteTheme',t);
      document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    });
  });
});
</script>
</body>
</html>
